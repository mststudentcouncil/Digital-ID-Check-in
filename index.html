<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital ID & Check-in</title>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { anuphan: ['Anuphan', 'sans-serif'] }, colors: { mstPurple: '#4A148C', mstYellow: '#FFC107', mstCream: '#FFF9C4', lineGreen: '#06C755' } } } }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body { font-family: 'Anuphan', sans-serif; background: linear-gradient(135deg, #f3e5f5 0%, #fffde7 100%); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05); }
        .loader-overlay { position: fixed; inset: 0; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-800 antialiased pb-10">

    <div id="globalLoader" class="loader-overlay"><i class="fas fa-circle-notch fa-spin text-5xl text-mstPurple mb-4"></i><p class="text-lg font-bold text-mstPurple" id="loaderText">กำลังโหลดข้อมูล...</p></div>

    <main class="max-w-md mx-auto px-4 pt-6" id="mainContainer">
        
        <section id="loginPage" class="hidden fade-in flex flex-col items-center justify-center min-h-[80vh]">
            <div class="glass rounded-3xl p-8 text-center w-full shadow-lg">
                <img src="https://i.ibb.co/GQYCbXrc/logo.webp" class="w-24 h-24 mx-auto mb-4 drop-shadow-xl" alt="MSTSC Logo">
                <h2 class="text-2xl font-black text-mstPurple mb-1">DIGITAL ID</h2>
                <p class="text-sm font-bold text-gray-600 mb-6">STUDENT COUNCIL</p>
                <button onclick="liff.login()" class="w-full bg-lineGreen text-white py-3.5 rounded-xl font-bold shadow-lg hover:opacity-90 flex items-center justify-center gap-3 text-lg"><i class="fab fa-line text-2xl"></i> เข้าสู่ระบบด้วย LINE</button>
            </div>
        </section>

        <section id="registerPage" class="hidden fade-in glass rounded-2xl p-6 shadow-md">
            <h2 class="text-xl font-bold text-mstPurple mb-4 text-center">สร้างบัตรประจำตัว</h2>
            <form id="registerForm" class="space-y-4">
                <input type="text" id="regName" placeholder="ชื่อ-นามสกุล *" required class="w-full p-3 rounded-xl border bg-white/90 outline-none">
                <input type="text" id="regClass" placeholder="ชั้น/ห้อง (เช่น 1/1, 4/3) *" required class="w-full p-3 rounded-xl border bg-white/90 outline-none">
                <input type="tel" id="regPhone" placeholder="เบอร์โทรศัพท์ *" required class="w-full p-3 rounded-xl border bg-white/90 outline-none">
                <input type="text" id="regStdId" placeholder="รหัสนักเรียน 5 หลัก (ยังไม่มีเว้นว่างได้)" class="w-full p-3 rounded-xl border bg-white/90 outline-none placeholder-orange-400">
                <button type="submit" class="w-full bg-mstPurple text-white py-3.5 rounded-xl font-bold shadow-md mt-4 text-lg">สร้างบัตรทันที</button>
            </form>
        </section>

        <section id="studentDashboard" class="hidden fade-in">
            <div id="updateNotice" class="hidden bg-mstYellow/20 border border-mstYellow rounded-xl p-4 mb-4 flex items-start gap-3">
                <i class="fas fa-bell text-yellow-600 mt-1"></i>
                <div>
                    <p class="text-sm font-bold text-yellow-800">อัปเดตข้อมูลของคุณด่วน!</p>
                    <p class="text-xs text-yellow-700 mb-2">คุณยังไม่ได้ระบุรหัสนักเรียน อย่าลืมมาอัปเดตนะ</p>
                    <button onclick="$('#editProfileModal').removeClass('hidden')" class="bg-yellow-600 text-white text-xs px-3 py-1.5 rounded-lg font-bold">อัปเดตรหัสตอนนี้</button>
                </div>
            </div>

            <div class="glass rounded-3xl p-6 text-center shadow-lg relative overflow-hidden border border-white">
                <div class="absolute top-0 left-0 w-full h-24 bg-gradient-to-r from-mstPurple to-[#7E57C2] rounded-t-3xl -z-10"></div>
                <img id="profileImage" src="" class="w-24 h-24 rounded-full border-4 border-mstYellow shadow-md mx-auto mt-4 object-cover bg-white">
                <h2 id="cardName" class="text-xl font-black text-gray-800 mt-3"></h2>
                <p id="cardClass" class="text-mstPurple font-bold text-sm bg-purple-100 px-3 py-1 rounded-full inline-block mt-1"></p>
                <p id="cardStdId" class="text-gray-500 font-mono text-xs mt-2"></p>

                <div class="bg-white p-4 rounded-2xl shadow-inner mt-6 border border-gray-100 inline-block">
                    <div id="qrcode" class="mx-auto flex justify-center"></div>
                    <p id="cardRef" class="text-[10px] text-gray-400 mt-2 font-mono tracking-widest"></p>
                </div>
                <p class="text-xs text-gray-500 mt-4"><i class="fas fa-qrcode text-mstPurple"></i> สแกนเพื่อเข้ากิจกรรม / สะสมแต้ม</p>
            </div>

            <div class="mt-6 flex justify-between items-center gap-3">
                <button onclick="checkAdminAuth()" class="flex-1 glass text-xs text-mstPurple font-bold py-3 rounded-xl hover:bg-white transition-all shadow-sm">
                    <i class="fas fa-shield-alt mr-1"></i> สำหรับสภาฯ
                </button>
                <button onclick="liff.logout(); window.location.reload();" class="glass text-xs text-red-500 font-bold py-3 px-4 rounded-xl hover:bg-red-50 shadow-sm"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </section>

        <section id="verifyScreen" class="hidden fixed inset-0 flex items-center justify-center p-4 z-50 bg-gradient-to-br from-[#f3e5f5] to-[#fffde7]">
            <div class="glass p-8 rounded-[2rem] w-full max-w-md relative fade-in shadow-2xl">
                <button onclick="$('#verifyScreen').addClass('hidden')" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 w-8 h-8 flex items-center justify-center bg-white rounded-full"><i class="fas fa-times"></i></button>
                <div class="text-center mb-6 mt-4">
                    <h2 class="text-2xl font-black text-mstPurple">ยืนยันตัวตนสภาฯ</h2>
                    <p class="text-xs text-gray-500 mt-2">กรอกข้อมูลตรงกับระบบ REGIS</p>
                </div>
                <form id="verifyForm" class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-mstPurple uppercase mb-2">รหัสนักเรียน (5 หลัก)</label>
                        <input type="tel" id="v_std_id" required class="w-full p-4 rounded-xl border-2 border-white bg-white/80 focus:border-mstPurple text-center tracking-[0.3em] font-black text-xl text-gray-800 outline-none" maxlength="5">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-mstPurple uppercase mb-2">เลขบัตร ปชช. (13 หลัก)</label>
                        <input type="tel" id="v_id_card" required class="w-full p-4 rounded-xl border-2 border-white bg-white/80 focus:border-mstPurple text-center tracking-[0.2em] font-black text-lg text-gray-800 outline-none" maxlength="13">
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-mstPurple to-[#601cb8] text-mstYellow py-4 rounded-xl font-black shadow-lg mt-4 text-lg">เข้าสู่ระบบ</button>
                </form>
            </div>
        </section>

        <section id="adminDashboard" class="hidden fade-in pb-10">
            <div class="glass rounded-2xl p-5 mb-5 flex justify-between items-center border border-white">
                <div>
                    <h2 class="font-black text-mstPurple text-lg">Scanner Panel</h2>
                    <p class="text-xs font-bold text-gray-500" id="showAdminName"></p>
                </div>
                <button onclick="nav('studentDashboard')" class="bg-gray-100 w-10 h-10 rounded-full flex items-center justify-center text-gray-500"><i class="fas fa-times"></i></button>
            </div>

            <div class="glass rounded-2xl p-6 shadow-md text-center border border-white">
                <input type="text" id="eventName" placeholder="ตั้งชื่อกิจกรรม (เช่น ปฐมนิเทศ ม.1)" class="w-full p-4 rounded-xl border border-gray-200 bg-white/90 text-center font-bold text-mstPurple mb-4 outline-none focus:border-mstPurple">
                
                <button onclick="startScan()" class="w-full bg-mstYellow text-mstPurple py-10 rounded-2xl font-black shadow-lg hover:-translate-y-1 transition-all text-2xl flex flex-col items-center justify-center gap-3">
                    <i class="fas fa-qrcode text-5xl"></i> เปิดกล้องสแกน
                </button>
            </div>

            <div class="mt-6 flex gap-3">
                <button onclick="downloadCSV()" class="flex-1 bg-green-50 text-green-700 border border-green-200 py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2"><i class="fas fa-file-csv"></i> โหลดไฟล์สรุป (CSV)</button>
            </div>
        </section>

        <div id="editProfileModal" class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
            <div class="glass p-6 rounded-3xl w-full max-w-sm fade-in shadow-2xl">
                <h3 class="text-xl font-black text-mstPurple mb-4 text-center">อัปเดตรหัสนักเรียน</h3>
                <input type="tel" id="updateStdId" placeholder="กรอกรหัส 5 หลัก" class="w-full p-4 rounded-xl border bg-white/90 text-center font-bold text-lg outline-none mb-4" maxlength="5">
                <div class="flex gap-2">
                    <button onclick="$('#editProfileModal').addClass('hidden')" class="w-1/3 bg-gray-200 py-3 rounded-xl font-bold">ปิด</button>
                    <button onclick="saveNewStdId()" class="w-2/3 bg-mstPurple text-white py-3 rounded-xl font-bold">บันทึกข้อมูล</button>
                </div>
            </div>
        </div>

    </main>

    <script>
        const LIFF_ID = "2008923798-Py9KNvvH"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbx8eeLBeuAy6MQT8QD58xaVdXEyJifrGg7aV-JUbqNnR680oXQ0Jnm8n98JqLEIHNbL/exec"; 
        
        let liffProfile = null; let userData = null; let adminName = ""; let qrCodeObj = null;

        async function main() {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { hideLoader(); nav('loginPage'); } 
            else { 
                liffProfile = await liff.getProfile(); 
                $('#profileImage').attr('src', liffProfile.pictureUrl);
                checkUserStatus(); 
            }
        }
        main();

        function setLoader(text) { $('#globalLoader').css('display', 'flex'); $('#loaderText').text(text); }
        function hideLoader() { $('#globalLoader').hide(); }
        function nav(pageId) { $('#mainContainer > section').addClass('hidden'); $('#' + pageId).removeClass('hidden').addClass('fade-in'); }

        async function checkUserStatus() {
            try {
                const res = await fetch(`${GAS_URL}?action=getUser&uid=${liffProfile.userId}`);
                const data = await res.json();
                if (data.status === 'found') { 
                    userData = data.user; 
                    renderCard();
                    nav('studentDashboard'); 
                } else { nav('registerPage'); }
            } catch (e) { Swal.fire('Error', 'เชื่อมต่อขัดข้อง', 'error'); }
            hideLoader();
        }

        $('#registerForm').on('submit', async function(e) {
            e.preventDefault(); setLoader('กำลังสร้างบัตร...');
            const payload = { action: 'registerUser', uid: liffProfile.userId, name: $('#regName').val(), className: $('#regClass').val(), phone: $('#regPhone').val(), studentId: $('#regStdId').val() };
            try { 
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) }); const data = await res.json(); 
                if(data.status === 'success') { checkUserStatus(); } 
            } catch (error) {} 
        });

        function renderCard() {
            $('#cardName').text(userData.name); $('#cardClass').text("ห้อง " + userData.className);
            $('#cardRef').text(userData.refCode);
            
            // ตรวจสอบว่ากรอกรหัส นร. หรือยัง
            if(!userData.studentId || userData.studentId === "") {
                $('#cardStdId').text('ยังไม่ระบุรหัสนักเรียน'); $('#updateNotice').removeClass('hidden');
            } else {
                $('#cardStdId').text('รหัสนักเรียน: ' + userData.studentId); $('#updateNotice').addClass('hidden');
            }

            if(qrCodeObj) qrCodeObj.clear();
            $('#qrcode').empty();
            qrCodeObj = new QRCode(document.getElementById("qrcode"), { text: userData.refCode, width: 160, height: 160, colorDark : "#4A148C", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H });
        }

        async function saveNewStdId() {
            const newId = $('#updateStdId').val(); if(!newId) return;
            setLoader('บันทึก...');
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'updateProfile', uid: liffProfile.userId, studentId: newId }) });
            userData.studentId = newId; renderCard(); $('#editProfileModal').addClass('hidden'); hideLoader();
            Swal.fire('สำเร็จ', 'อัปเดตข้อมูลแล้ว', 'success');
        }

        // ฝั่งแอดมิน (ก๊อปปี้ Flow จาก Feedback)
        async function checkAdminAuth() {
            setLoader('ตรวจสอบสิทธิ์...');
            try {
                const res = await fetch(`${GAS_URL}?action=checkAdminLogin&uid=${liffProfile.userId}`);
                const data = await res.json();
                if (data.status === 'found') {
                    adminName = data.name; $('#showAdminName').text("Admin: " + adminName); nav('adminDashboard');
                } else { $('#verifyScreen').removeClass('hidden'); }
            } catch (e) {} hideLoader();
        }

        $('#verifyForm').on('submit', async function(e) {
            e.preventDefault(); setLoader('ซิงค์ระบบ...');
            const payload = { action: 'verifyAdmin', uid: liffProfile.userId, std_id: $('#v_std_id').val(), id_card: $('#v_id_card').val() };
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) }); const data = await res.json();
                if (data.status === 'success') {
                    adminName = data.name; Swal.fire('สำเร็จ', 'ยืนยันตัวตนผ่าน', 'success').then(() => { $('#verifyScreen').addClass('hidden'); $('#showAdminName').text("Admin: " + adminName); nav('adminDashboard'); });
                } else { Swal.fire('ไม่ผ่าน', 'ข้อมูลไม่ตรงกับฐานข้อมูลสภาฯ', 'error'); }
            } catch (e) {} hideLoader();
        });

        function startScan() {
            const evtName = $('#eventName').val();
            if(!evtName) return Swal.fire('แจ้งเตือน', 'กรุณาตั้งชื่อกิจกรรมก่อนสแกน', 'warning');

            if (liff.scanCodeV2) {
                liff.scanCodeV2().then(result => {
                    const scannedCode = result.value;
                    if(scannedCode.startsWith("MSTSC_")) { recordScan(scannedCode, evtName); } 
                    else { Swal.fire('ผิดพลาด', 'QR ไม่ใช่ของระบบ ม.ส.ธ.', 'error'); }
                }).catch(e => { console.log("ยกเลิกสแกน"); });
            } else { Swal.fire('Error', 'มือถือไม่รองรับการสแกนผ่าน LIFF', 'error'); }
        }

        async function recordScan(refCode, evtName) {
            setLoader('บันทึก...');
            try {
                const payload = { action: 'recordCheckIn', refCode: refCode, eventName: evtName, adminName: adminName };
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) }); const data = await res.json();
                if(data.status === 'success') {
                    Swal.fire({ title: 'เช็กชื่อผ่าน!', text: `${data.student.name} (${data.student.className})`, icon: 'success', timer: 2000, showConfirmButton: false }).then(() => startScan());
                } else { Swal.fire('ไม่พบผู้ใช้', 'QR Code นี้ไม่พบในระบบ', 'error'); }
            } catch (e) { Swal.fire('Error', 'บันทึกไม่สำเร็จ', 'error'); }
            hideLoader();
        }

        async function downloadCSV() {
            setLoader('สร้างไฟล์...');
            const res = await fetch(`${GAS_URL}?action=getLogs`); const result = await res.json(); hideLoader();
            if(!result.data || result.data.length === 0) return Swal.fire('แจ้งเตือน', 'ยังไม่มีประวัติการสแกน', 'info');
            
            let csvContent = "data:text/csv;charset=utf-8,\uFEFFTimestamp,EventName,RefCode,StudentName,Class,ScannerName\n";
            result.data.forEach(row => { csvContent += `${new Date(row.Timestamp).toLocaleString('th-TH')},${row.EventName},${row.RefCode},${row.StudentName},${row.Class},${row.ScannerName}\n`; });
            const encodedUri = encodeURI(csvContent); const link = document.createElement("a"); link.setAttribute("href", encodedUri); link.setAttribute("download", "MSTSC_Event_Logs.csv");
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }
    </script>
</body>
</html>
